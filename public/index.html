<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oxtgen</title>

  <script src="/scram/scramjet.all.js"></script>
  <script src="/baremux/index.js"></script>
  <link rel="prefetch" href="/scram/scramjet.wasm.wasm" />
  <link rel="prefetch" href="/scram/scramjet.sync.js" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f0f7ff;
      --surface: #ffffff;
      --surface2: #e8f2fc;
      --accent: #3b9eff;
      --accent-dark: #1a7fe0;
      --accent-light: #d0e9ff;
      --text: #0d1f33;
      --muted: #6b8aaa;
      --border: rgba(59,158,255,0.15);
      --shadow: 0 2px 16px rgba(59,158,255,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── App shell ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      z-index: 10;
      flex-shrink: 0;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
      cursor: pointer;
    }

    .logo-badge {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b9eff, #1a7fe0);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: white;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-dark);
      letter-spacing: -0.02em;
    }

    /* ── Nav buttons ── */
    .nav-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      font-size: 15px;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--accent-light);
      color: var(--accent-dark);
      border-color: var(--accent);
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── URL bar ── */
    .url-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      gap: 8px;
      height: 36px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .url-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,158,255,0.15);
      background: var(--surface);
    }

    .url-icon {
      color: var(--muted);
      font-size: 13px;
      flex-shrink: 0;
    }

    #url-bar {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
      min-width: 0;
      caret-color: var(--accent);
    }

    #url-bar::placeholder { color: var(--muted); }

    #go-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      padding: 5px 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #go-btn:hover { background: var(--accent-dark); }
    #go-btn:active { transform: scale(0.97); }

    /* ── Homepage (shown when no page is loaded) ── */
    #homepage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      background: var(--bg);
      overflow-y: auto;
    }

    .home-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.6s ease both;
    }

    .home-badge {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b9eff, #1a7fe0);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      color: white;
      box-shadow: 0 8px 32px rgba(59,158,255,0.3);
    }

    .home-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .home-sub {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .home-search {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 18px;
      gap: 10px;
      box-shadow: var(--shadow);
      animation: fadeUp 0.6s 0.1s ease both;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .home-search:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(59,158,255,0.12), var(--shadow);
    }

    #home-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      caret-color: var(--accent);
      min-width: 0;
    }

    #home-input::placeholder { color: var(--muted); }

    #home-go {
      background: linear-gradient(135deg, #3b9eff, #1a7fe0);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #home-go:hover { opacity: 0.9; }
    #home-go:active { transform: scale(0.97); }

    /* ── Quick links ── */
    .quick-links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 560px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .qlink {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .qlink:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* ── iframe view ── */
    #frame-wrap {
      flex: 1;
      display: none;
      position: relative;
      overflow: hidden;
    }

    #proxy-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* ── Loading bar ── */
    .load-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #3b9eff, #7cc8ff);
      border-radius: 0 2px 2px 0;
      width: 0%;
      transition: width 0.3s ease;
      z-index: 5;
      display: none;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <!-- Logo -->
    <div class="logo" id="home-link">
      <div class="logo-badge">O2</div>
      <span class="logo-text">Oxygen</span>
    </div>

    <!-- Nav buttons -->
    <button class="nav-btn" id="btn-back" disabled title="Back">&#8592;</button>
    <button class="nav-btn" id="btn-fwd" disabled title="Forward">&#8594;</button>
    <button class="nav-btn" id="btn-reload" disabled title="Reload">&#8635;</button>

    <!-- URL bar -->
    <div class="url-wrap">
      <span class="url-icon">&#128274;</span>
      <input id="url-bar" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false" />
      <button id="go-btn">Go</button>
    </div>
  </div>

  <!-- Homepage -->
  <div id="homepage">
    <div class="home-logo">
      <div class="home-badge">O2</div>
      <div class="home-title">Oxygen</div>
      <div class="home-sub">Browse freely &middot; Stay private</div>
    </div>

    <div class="home-search">
      <input id="home-input" type="text" placeholder="Search or enter a URL..." autocomplete="off" spellcheck="false" />
      <button id="home-go">Go &rarr;</button>
    </div>

    <nav class="quick-links">
      <span class="qlink" data-url="https://google.com">&#128269; Google</span>
      <span class="qlink" data-url="https://youtube.com">&#9654; YouTube</span>
      <span class="qlink" data-url="https://spatulatick.github.io/o2flix/Index.html">&#128172; Movies</span>
      <span class="qlink" data-url="https://discord.com">&#127908; Discord</span>
      <span class="qlink" data-url="https://spotify.com">&#127925; Spotify</span>
      <span class="qlink" data-url="https://twitter.com">&#10003; Twitter</span>
    </nav>

    <div class="status-row">
      <span class="status-dot"></span>
      <span>proxy online</span>
    </div>
  </div>

  <!-- Proxy iframe view -->
  <div id="frame-wrap">
    <div class="load-bar" id="load-bar"></div>
    <iframe id="proxy-frame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"></iframe>
  </div>

</div>

<script src="/static/app.js" type="module"></script>

<script>
  // Quick link pills
  document.querySelectorAll(".qlink[data-url]").forEach(el => {
    el.addEventListener("click", () => {
      document.getElementById("home-input").value = el.dataset.url;
      document.getElementById("home-go").click();
    });
  });
</script>

</body>
</html>
